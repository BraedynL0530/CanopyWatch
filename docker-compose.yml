services:
  frontend:
    build: ./react-frontend
    ports:
      - "3000:80"
    depends_on:
      - api

  # Backend
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_BROKER_URL=redis://redis:6379/0
      - REDIS_BACKEND_URL=redis://redis:6379/1
    depends_on:
      - redis

  # Celery
  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    # Ensure the command points to the right path given the context
    command: celery -A backend.services.tasks worker --loglevel=info
    environment:
      - REDIS_BROKER_URL=redis://redis:6379/0
      - REDIS_BACKEND_URL=redis://redis:6379/1
    depends_on:
      - redis

  # Redis
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"