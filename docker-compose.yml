services:
  frontend:
    build: ./react-frontend
    ports:
      - "3000:80"
    depends_on:
      - api

  # Backend
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env  #DURRR
    environment:
      - PYTHONPATH=/app
      - REDIS_BROKER_URL=redis://redis:6379/0
      - REDIS_BACKEND_URL=redis://redis:6379/1
    volumes:
      - shared_artifacts:/app/artifacts
    ports:
      - "8000:8000"
    depends_on:
      - redis

  # Celery
  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A backend.services.tasks worker --loglevel=info --concurrency=1
    environment:
      - REDIS_BROKER_URL=redis://redis:6379/0
      - REDIS_BACKEND_URL=redis://redis:6379/1
    env_file:
      - .env
    volumes:
      - shared_artifacts:/app/artifacts
      - ./backend/canopywatch-501723-a043d6a0ac0b.json:/app/canopywatch-501723-a043d6a0ac0b.json:ro
    depends_on:
      - redis

  # Redis
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  nginx:
    build:
      context: .
      dockerfile: nginx.Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api
      - frontend

volumes:
  shared_artifacts: {}