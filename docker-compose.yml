version: '3.8'

services:
  #Frontend
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - api

  #backend
  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_BROKER_URL=redis://redis:6379/0
      - REDIS_BACKEND_URL=redis://redis:6379/1
    depends_on:
      - redis

  #Celery
  worker:
    build: ./backend
    command: celery -A services.tasks worker --loglevel=info
    environment:
      - REDIS_BROKER_URL=redis://redis:6379/0
      - REDIS_BACKEND_URL=redis://redis:6379/1
    depends_on:
      - redis

  #Redis
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"